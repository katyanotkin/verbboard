<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Feedback admin</title>
  <link rel="stylesheet" href="/static/admin.css"/>
</head>
<body>
  <div
    id="admin-feedback-config"
    data-admin-prefix="{{ admin_prefix }}"
    data-feedback-api-base="{{ feedback_api_base }}"
  ></div>

  <main class="admin-page">
    <div class="card card-toolbar">
      <a class="nav-item active nav-item-tab" href="{{ admin_prefix }}/feedback">
        Feedback
      </a>
      <a class="nav-item nav-item-tab" href="{{ admin_prefix }}/#signals">
        Verb demand
      </a>
      <a class="nav-item nav-item-tab" href="{{ admin_prefix }}/#candidates">
        Candidates
      </a>
      <a href="{{ admin_prefix }}" style="margin-left:auto;">Back to admin</a>
    </div>

    <h1>Feedback admin</h1>

    <form id="filters" class="card card-form">
      <div class="filters-grid">
        <div>
          <label for="sort">Sort</label>
          <select id="sort" name="sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>
        </div>

        <div>
          <label for="visibility">Visibility</label>
          <select id="visibility" name="visibility">
            <option value="visible">Visible only</option>
            <option value="hidden">Hidden only</option>
            <option value="all">All</option>
          </select>
        </div>

        <div>
          <label for="page">Page</label>
          <select id="page" name="page">
            <option value="">All pages</option>
          </select>
        </div>

        <div>
          <label for="language">Language</label>
          <select id="language" name="language">
            <option value="">All languages</option>
          </select>
        </div>

        <div>
          <label for="source">Source</label>
          <select id="source" name="source">
            <option value="">All sources</option>
          </select>
        </div>

        <div>
          <label for="query">Text search</label>
          <input id="query" type="text" name="query" placeholder="Search comment text">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Apply</button>
        <a href="{{ admin_prefix }}/feedback">Reset</a>
      </div>
    </form>

    <div id="feedback-list" class="card card-body">Loading…</div>
  </main>

  <script src="/static/admin_feedback.js"></script>
</body>
</html>
