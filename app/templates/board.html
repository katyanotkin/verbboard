<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{title}}</title>

<style>
body { font-family: system-ui, sans-serif; margin: 24px; max-width: 980px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
th { background: #f6f6f6; }
button { padding: 6px 10px; cursor: pointer; }

.btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

:root {
  --color-default: #cccccc;
  --color-en: #4a90e2;
  --color-ru: #d9534f;
  --color-he: #5cb85c;
  --color-es: #e0b84f;
}

.btn {
  background-color: var(--color-default);
  color: #000;
}

.btn[data-lang="en"] { background-color: var(--color-en); }
.btn[data-lang="ru"] { background-color: var(--color-ru); }
.btn[data-lang="he"] { background-color: var(--color-he); }
.btn[data-lang="es"] { background-color: var(--color-es); }

.btn:hover {
  filter: brightness(0.9);
  transform: scale(1.05);
  opacity: 0.9;
}

.slow-btn {
  width: 42px;
  height: 42px;
  margin-left: 6px;
  padding: 0;
  border: 1px solid #ddd;
  border-radius: 50%;
  background: #f5f5f5;
  color: #333;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
}

.slow-btn:hover {
  background: #ececec;
  border-color: #ccc;
  transform: scale(1.05);
}

.slow-btn:active {
  transform: scale(0.97);
}

.slow-icon {
  width: 26px;
  height: 26px;
  display: block;
  filter: brightness(0) invert(0.2);
}

.topbar {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.meta {
  color: #555;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.voice-form {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0;
}

.voice-form label {
  font-weight: 600;
}

.voice-form select {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

.known-btn {
  width: 42px;
  height: 42px;
  padding: 0;
  border: 1px solid #ddd;
  border-radius: 50%;
  background: #f5f5f5;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
}

.known-btn.pop {
  animation: known-pop 0.22s ease-out;
}

@keyframes known-pop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.16); }
  100% { transform: scale(1); }
}

.known-btn:hover {
  background: #ececec;
  border-color: #ccc;
  transform: scale(1.05);
}

.known-btn:hover .known-icon {
  filter: saturate(1.3) brightness(1.1);
}

.known-btn.is-active {
  background: #fff3c4;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.25);
}

.known-btn:not(.is-active) .known-icon {
  filter: grayscale(0.4) brightness(0.9);
}

.known-icon {
  width: 22px;
  height: 22px;
  display: block;
  filter: saturate(1.4) brightness(1.15);
}

.home-link {
  margin: 0 0 18px 0;
}
</style>

<script defer src="/static/learn.js"></script>
</head>

<body>
<div id="learn-page" data-language="{{language}}" data-verb-id="{{verb_id}}">
  <h1 style="margin-bottom:6px;">{{title}}</h1>

  <div class="topbar">
    <div class="meta">
      Language: <b>{{language}}</b> · Voice: <b>{{voice}}</b>
    </div>

    <div class="topbar-actions">
      <form method="get" action="/learn" class="voice-form">
        <input type="hidden" name="language" value="{{language}}">
        <input type="hidden" name="verb_id" value="{{verb_id}}">
        <label for="voice">Voice</label>
        <select id="voice" name="voice" onchange="this.form.submit()">
          <option value="female" {{female_selected}}>Female</option>
          <option value="male" {{male_selected}}>Male</option>
        </select>
      </form>

      <button class="known-btn" id="known-btn" title="Mark as known" aria-pressed="false">
        <img src="/static/gold-star.svg" class="known-icon" alt="Known">
      </button>
    </div>
  </div>

  <p class="home-link"><a href="{{home_href}}">Home</a></p>

  {{sections}}

  <h2>Examples</h2>

  <table>
    <tr><th>Sentence</th><th>Audio</th></tr>
    {{examples}}
  </table>
</div>
</body>
</html>
