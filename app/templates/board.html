<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{title}}</title>

<style>
body { font-family: system-ui, sans-serif; margin: 24px; max-width: 980px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
th { background: #f6f6f6; }
button { padding: 6px 10px; cursor: pointer; }

.btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  padding: 0;
}

:root {
  --color-default: #cccccc;
  --color-en: #4a90e2;
  --color-ru: #d9534f;
  --color-he: #5cb85c;
  --color-es: #e0b84f;
}

.btn {
  background-color: var(--color-default);
  color: #000;
}

.btn[data-lang="en"] { background-color: var(--color-en); }
.btn[data-lang="ru"] { background-color: var(--color-ru); }
.btn[data-lang="he"] { background-color: var(--color-he); }
.btn[data-lang="es"] { background-color: var(--color-es); }

.btn:hover {
  filter: brightness(0.9);
  transform: scale(1.05);
  opacity: 0.9;
}

.slow-btn {
  width: 42px;
  height: 42px;
  margin-left: 6px;
  padding: 0;

  border: 1px solid #ddd;
  border-radius: 50%;

  background: #f5f5f5;
  color: #333;

  cursor: pointer;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
}

.slow-btn:hover {
  background: #ececec;
  border-color: #ccc;
  transform: scale(1.05);
}

.slow-btn:active {
  transform: scale(0.97);
}

.slow-icon {
  width: 26px;
  height: 26px;
  display: block;
  filter: brightness(0) invert(0.2);
}

.topbar {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.meta {
  color: #555;
}

.voice-form {
  display: flex;
  align-items: center;
  gap: 8px;
}

.voice-form label {
  font-weight: 600;
}

.voice-form select {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

.home-link {
  margin: 0 0 18px 0;
}
</style>

</head>

<body>

<h1 style="margin-bottom:6px;">{{title}}</h1>

<div class="topbar">
  <div class="meta">
    Language: <b>{{language}}</b> · Voice: <b>{{voice}}</b>
  </div>

  <form method="get" action="/learn" class="voice-form" style="margin:0;">
    <input type="hidden" name="language" value="{{language}}">
    <input type="hidden" name="verb_id" value="{{verb_id}}">
    <label for="voice">Voice</label>
    <select id="voice" name="voice" onchange="this.form.submit()">
      <option value="female" {{female_selected}}>Female</option>
      <option value="male" {{male_selected}}>Male</option>
    </select>
  </form>
</div>

<p class="home-link"><a href="{{home_href}}">Home</a></p>

{{sections}}

<h2>Examples</h2>

<table>
<tr><th>Sentence</th><th>Audio</th></tr>

{{examples}}

</table>

<script>
  (function() {
    const language = "{{language}}";
    const verbId = "{{verb_id}}";
    const storageKey = `seen:${language}`;

    const seen = JSON.parse(localStorage.getItem(storageKey) || "[]");
    if (!seen.includes(verbId)) {
      seen.push(verbId);
      localStorage.setItem(storageKey, JSON.stringify(seen));
    }
  })();
</script>

</body>
</html>
