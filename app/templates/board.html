<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{title}}</title>

<style>
body { font-family: system-ui, sans-serif; margin: 24px; max-width: 980px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
th { background: #f6f6f6; }
button { padding: 6px 10px; cursor: pointer; }

.play-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  padding: 0;
}

.play-en {
  background: #1e88e5;   /* blue */
}

.play-ru {
  background: #e53935;   /* red */
}

.play-he {
  background: #43a047;   /* green */
}

.play-btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.slow-btn {
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
  margin-left: 6px;
}

.slow-btn:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<h1 style="margin-bottom:6px;">{{title}}</h1>

<div style="color:#555;margin-bottom:16px;">
Language: <b>{{language}}</b> · Voice: <b>{{voice}}</b>
</div>

<p><a href="/">Home</a></p>

{{sections}}

<h2>Examples</h2>

<table>
<tr><th>Sentence</th><th>Audio</th></tr>

{{examples}}

</table>

</body>
</html>
