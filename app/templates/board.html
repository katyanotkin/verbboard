<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{title}}</title>

<style>
body {
  font-family: system-ui, sans-serif;
  margin: 24px auto;
  max-width: 980px;
  padding: 0 16px;
  background: #f8fafc;
  color: #1f2937;
}

h1 {
  margin: 0 0 6px 0;
  font-size: 32px;
  line-height: 1.15;
}

h2 {
  margin: 24px 0 12px 0;
  font-size: 22px;
  color: #111827;
}

table {
  border-collapse: separate;
  border-spacing: 0;
  width: 100%;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
}

th,
td {
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1px solid #e5e7eb;
}

th {
  background: #f8fafc;
  color: #374151;
  font-weight: 700;
}

tr:last-child td {
  border-bottom: none;
}

button {
  padding: 6px 10px;
  cursor: pointer;
}

.btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.btn {
  background-color: #4a90e2;
  color: white;
}

.btn:hover {
  filter: brightness(0.92);
  transform: scale(1.05);
}

.nav-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  padding: 10px 18px;
  border-radius: 999px;

  background: #1e3a8a;   /* dark blue */
  color: white;

  border: none;

  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.12s ease;
}

.nav-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.1);
}

.nav-btn:active {
  transform: translateY(0);
}

.nav-arrow {
  font-size: 20px;
  line-height: 1;
}

.slow-btn {
  width: 42px;
  height: 42px;
  margin-left: 6px;
  padding: 0;
  border: 1px solid #ddd;
  border-radius: 50%;
  background: #f5f5f5;
  color: #333;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
}

.slow-btn:hover {
  background: #ececec;
  border-color: #ccc;
  transform: scale(1.05);
}

.slow-btn:active {
  transform: scale(0.97);
}

.slow-icon {
  width: 26px;
  height: 26px;
  display: block;
  filter: brightness(0) invert(0.2);
}

.topbar {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  padding: 16px 18px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
}

.meta {
  color: #6b7280;
  font-size: 14px;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.voice-control {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.voice-icon {
  font-size: 14px;
  color: #6b7280;
}

.voice-toggle {
  display: inline-flex;
  border-radius: 999px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
  background: #f3f4f6;
}

.voice-btn {
  padding: 8px 14px;
  border: none;
  background: transparent;
  color: #6b7280;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.12s ease;
}

.voice-btn + .voice-btn {
  border-left: 1px solid #e5e7eb;
}

.voice-btn.active {
  background: #4a90e2;
  color: white;
}

.known-btn {
  width: 42px;
  height: 42px;
  padding: 0;
  border: 1px solid #ddd;
  border-radius: 50%;
  background: #f5f5f5;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
}

.known-btn:hover {
  background: #ececec;
  border-color: #ccc;
  transform: scale(1.05);
}

.known-btn:hover .known-icon {
  filter: saturate(1.3) brightness(1.1);
}

.known-btn.is-active {
  background: #fff3c4;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.25);
}

.known-btn.pop {
  animation: known-pop 0.22s ease-out;
}

@keyframes known-pop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.16); }
  100% { transform: scale(1); }
}

.known-btn:not(.is-active) .known-icon {
  filter: grayscale(0.4) brightness(0.9);
}

.known-icon {
  width: 22px;
  height: 22px;
  display: block;
  filter: saturate(1.4) brightness(1.15);
}


.section-block {
  margin-bottom: 20px;
}
</style>

<script defer src="/static/learn.js"></script>
</head>

<body>
<div id="learn-page" data-language="{{language}}" data-verb-id="{{verb_id}}">
  <div class="topbar">
    <div>
      <h1>{{title}}</h1>
      <div class="meta">
        Language: <b>{{language}}</b>
      </div>
    </div>

    <div class="topbar-actions">
	  <a href="{{home_href}}" class="nav-btn">
	    <span class="nav-arrow">⟵</span>
	    <span>Verbs</span>
	  </a>

	  <form method="get" action="/learn" class="voice-toggle">
		  <input type="hidden" name="language" value="{{language}}">
		  <input type="hidden" name="verb_id" value="{{verb_id}}">

		 <span class="voice-icon">🔊</span>
		 <div class="voice-toggle">
		    <button type="submit" name="voice" value="female" class="voice-btn {{female_active}}">
		      Female
		    </button>

		    <button type="submit" name="voice" value="male" class="voice-btn {{male_active}}">
		      Male
		    </button>
		 </div>

	</form>

	  <button class="known-btn" id="known-btn" title="Mark as known" aria-pressed="false">
	    <img src="/static/gold-star.svg" class="known-icon" alt="Known">
	  </button>
	</div>	    
  </div>

  <div class="section-block">
    {{sections}}
  </div>

  <h2>Examples</h2>

  <table>
    <tr><th>Sentence</th><th>Audio</th></tr>
    {{examples}}
  </table>
</div>
</body>
</html>
