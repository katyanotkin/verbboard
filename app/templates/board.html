<!doctype html>
<html lang="{{html_lang}}" dir="{{html_dir}}">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{title}}</title>
<link rel="stylesheet" href="/static/common.css"/>
<link rel="stylesheet" href="/static/learn.css"/>
{{candidate_banner_assets}}

<script>window.UI = {{board_ui_json}};</script>
<script defer src="/static/learn.js"></script>
</head>

<body>
{{candidate_banner}}
<div id="learn-page" data-language="{{language}}" data-verb-id="{{verb_id}}">
  <div class="topbar">
    <div>
      <h1>{{title}}</h1>
      <div class="meta">
        {{board_language_label}} <b>{{language}}</b>
      </div>
    </div>

    <div class="topbar-actions">
	  <a href="{{return_to}}" class="nav-btn">
	    <span class="nav-arrow">⟵</span>
	    <span>{{board_back}}</span>
	  </a>

	  <form method="get" action="/learn" class="voice-control">
		  <input type="hidden" name="language" value="{{language}}">
		  <input type="hidden" name="verb_id" value="{{verb_id}}">
		  {{voice_source_input}}

		 <span class="voice-icon">🔊</span>
		 <div class="voice-toggle">
		    <button type="submit" name="voice" value="female" class="voice-btn {{female_active}}">
		      ♀ {{board_voice_female}}
		    </button>

		    <button type="submit" name="voice" value="male" class="voice-btn {{male_active}}">
		      ♂ {{board_voice_male}}
		    </button>
		 </div>

	</form>

	  <button class="known-btn" id="known-btn" title="{{board_mark_known}}" aria-pressed="false">
	    <img src="/static/gold-star.svg" class="known-icon" alt="{{board_mark_known}}">
	  </button>

	  <a
	    href="/feedback?page=learn&amp;language={{language | urlencode}}&amp;verb_id={{verb_id | urlencode}}&amp;return_to={{learn_href | urlencode}}"
  	    class="feedback-link"
  	    title="{{board_send_feedback}}"
	  >
  	    <span>💬</span>
  	    <span>{{board_send_feedback}}</span>
	  </a>
	</div>
  </div>

  <div class="section-block">
    {{sections}}
  </div>

  <h2>{{board_examples_heading}}</h2>

  <table>
    <tr><th>{{board_col_sentence}}</th><th>{{board_col_audio}}</th></tr>
    {{examples}}
  </table>
</div>
</body>
</html>
