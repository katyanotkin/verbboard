<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{title}}</title>

<style>
body { font-family: system-ui, sans-serif; margin: 24px; max-width: 980px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
th { background: #f6f6f6; }
button { padding: 6px 10px; cursor: pointer; }

.play-btn {
  border: 2px solid #ccc;
  border-radius: 6px;
  background: white;
}

.play-en {
  border-color: #3b82f6;
}

.play-ru {
  border-color: #ef4444;
}

.play-he {
  border-color: #10b981;
}
</style>

</head>

<body>

<h1 style="margin-bottom:6px;">{{title}}</h1>

<div style="color:#555;margin-bottom:16px;">
Language: <b>{{language}}</b> · Voice: <b>{{voice}}</b>
</div>

<p><a href="/">Home</a></p>

{{sections}}

<h2>Examples</h2>

<table>
<tr><th>Sentence</th><th>Audio</th></tr>

{{examples}}

</table>

</body>
</html>
