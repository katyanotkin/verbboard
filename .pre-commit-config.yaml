repos:

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.6.9
  hooks:
    - id: ruff
      args: [--fix]

    - id: ruff-format


- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.11.1
  hooks:
    - id: mypy
      additional_dependencies:
        - types-requests
      args: ["--ignore-missing-imports"]


- repo: local
  hooks:

    - id: python-compile
      name: Python syntax check
      entry: python -m py_compile
      language: system
      types: [python]

    - id: regenerate-lexicons
      name: Generate runtime lexicons
      entry: bash -c "python -m tools.generate_lexicon --language en && python -m tools.generate_lexicon --language ru && python -m tools.generate_lexicon --language he && git diff --exit-code runtime/data"  
      language: system
      pass_filenames: false  

    - id: check-lexicons
      name: Validate all lexicons
      entry: python tools/check_all_lexicons.py
      language: system
      pass_filenames: false

    - id: check-template
      name: Validate board template
      entry: python tools/check_template.py
      language: system
      pass_filenames: false   

    - id: check-plugins
      name: Validate language plugins
      entry: python tools/check_plugins.py
      language: system
      pass_filenames: false    

    - id: pytest-demand
      name: pytest demand regression tests
      entry: bash -c 'PYTHONPATH=. pytest -q tests/test_recommendation_regression.py'
      language: system
      pass_filenames: false
